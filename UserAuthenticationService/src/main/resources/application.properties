spring.application.name=UserAuthenticationService

server.port=9898

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

spring.datasource.url=jdbc:mysql://localhost:3306/Restaurant
spring.datasource.username=root
# Database password from environment variable (defaults to 'root' for local development)
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --------------------------
# JWT Configuration
# --------------------------
# JWT secret from environment variable (REQUIRED in production)
# For local dev, you can set: JWT_SECRET=TXlTdXBlclNlY3JldEtleUF0TGVhc3QzMkNoYXJzTG9uZzEyMyE=
jwt.secret=${JWT_SECRET:TXlTdXBlclNlY3JldEtleUF0TGVhc3QzMkNoYXJzTG9uZzEyMyE=}

# --------------------------
# CORS Configuration
# --------------------------
# Allowed origins for WebSocket connections (comma-separated)
# For production, replace with your actual frontend URLs
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5500,http://localhost:5500,http://localhost:3000,http://localhost:4200}

# --------------------------
# Kafka Configuration
# --------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


spring.kafka.consumer.properties.spring.json.type.mapping=restaurantOrderInformationEvent:com.UserAuthenticationService.UserAuthenticationService.dto.RestaurantOrderInformationEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.UserAuthenticationService.UserAuthenticationService.dto.RestaurantOrderInformationEvent

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Resilience4j Configuration
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.slidingWindowSize=10
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.failureRateThreshold=50

resilience4j.circuitbreaker.instances.ORDERMANAGEMENTSERVICE.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.ORDERMANAGEMENTSERVICE.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ORDERMANAGEMENTSERVICE.failureRateThreshold=50

resilience4j.circuitbreaker.instances.DELIVERY-SERVICE.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.DELIVERY-SERVICE.slidingWindowSize=10
resilience4j.circuitbreaker.instances.DELIVERY-SERVICE.failureRateThreshold=50

resilience4j.timelimiter.instances.DELIVERY-SERVICE.timeoutDuration=5s

spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000

resilience4j.timelimiter.instances.ORDERMANAGEMENTSERVICE.timeoutDuration=20s
resilience4j.timelimiter.configs.default.timeoutDuration=20s
