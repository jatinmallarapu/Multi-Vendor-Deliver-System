spring.application.name=OrderManagementService

server.port=8083

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/Restaurant
spring.datasource.username=root
# Database password from environment variable (defaults to 'root' for local development)
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --------------------------
# Kafka Configuration
# --------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


spring.kafka.consumer.properties.spring.json.type.mapping=paymentStatusEvent:com.OrderManagementService.OrderManagementService.event.PaymentStatusEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.OrderManagementService.OrderManagementService.event.PaymentStatusEvent

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.slidingWindowSize=5
resilience4j.circuitbreaker.instances.RESTAURANTSERVICE.failureRateThreshold=50
