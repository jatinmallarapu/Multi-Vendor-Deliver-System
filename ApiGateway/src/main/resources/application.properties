spring.application.name=ApiGateway
server.port=8765

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

# --------------------------
# JWT Configuration
# --------------------------
# JWT secret from environment variable (MUST match UserAuthenticationService)
# For local dev, you can set: JWT_SECRET=TXlTdXBlclNlY3JldEtleUF0TGVhc3QzMkNoYXJzTG9uZzEyMyE=
jwt.secret=${JWT_SECRET:TXlTdXBlclNlY3JldEtleUF0TGVhc3QzMkNoYXJzTG9uZzEyMyE=}

