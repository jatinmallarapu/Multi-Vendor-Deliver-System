# --------------------------
# Application
# --------------------------
spring.application.name=delivery-service
server.port=8087

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

# --------------------------
# PostgreSQL
# --------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/Restaurant
spring.datasource.username=postgres
# Database password from environment variable (defaults to '123456' for local development)
spring.datasource.password=${DB_PASSWORD_POSTGRES:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --------------------------
# Kafka - Common
# --------------------------
spring.kafka.bootstrap-servers=localhost:9092

# --------------------------
# Kafka - Consumer
# --------------------------
spring.kafka.consumer.group-id=delivery-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.DeliveryAndLogisticService.DeliveryAndLogisticService.event.RestaurantOrderInformationEvent

# --------------------------
# Kafka - Producer
# --------------------------
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
